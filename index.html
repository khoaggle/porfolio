<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Melissa Zucker Style</title>
    <style>
        /* 1. Global Styles */
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #ffffff;
        }

        /* 2. Header & Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 60px 80px 40px 80px;
        }

        .logo h1 {
            font-weight: 300;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-size: 2.2rem;
            margin: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #666;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #000;
        }

        /* 3. Content Area */
        main {
            padding: 0 80px;
        }

        .instruction {
            font-size: 0.9rem;
            color: #888;
            font-style: italic;
            margin-bottom: 30px;
        }

        /* 4. The Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columns */
            gap: 20px;
            margin-bottom: 80px;
        }

        .portfolio-item {
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Makes them square */
            background-color: #f5f5f5;
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }

        .portfolio-item img:hover {
            opacity: 0.8;
            cursor: pointer;
        }

        /* Responsive Design for Mobile */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                padding: 40px 20px;
                text-align: center;
            }
            nav ul {
                margin-top: 20px;
                gap: 15px;
            }
            .portfolio-grid {
                grid-template-columns: 1fr; /* Stack on small screens */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>MELISSA ZUCKER</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Sketchbook</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Resume</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <p class="instruction">Click a photo to see more.</p>

        <section class="portfolio-grid">
            <div class="portfolio-item">
                <img src="https://via.placeholder.com/600x600?text=Project+1" alt="Industrial Design">
            </div>
            <div class="portfolio-item">
                <img src="https://via.placeholder.com/600x600?text=Project+2" alt="Fashion Design">
            </div>
            <div class="portfolio-item">
                <img src="https://via.placeholder.com/600x600?text=Project+3" alt="Engineering Project">
            </div>
        </section>
    </main>

</body>
</html>
